<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Goblin Scaling</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Major+Mono+Display&family=New+Rocker&family=VT323&display=swap" rel="stylesheet">
    <style>
      :root {
        /* Cold-paint defaults match the production options (New Rocker across
           the board) so the title screen doesn't briefly render in Audiowide
           before render.ts swaps in the user/default font. */
        --font-display: 'New Rocker', system-ui, serif;
        --font-mono: 'New Rocker', 'Consolas', monospace;
        --font-body: 'New Rocker', system-ui, -apple-system, "Segoe UI", sans-serif;
        --font-display-scale: 1;
        --font-mono-scale: 1;
        --font-body-scale: 1;
        --font-building-label-scale: 1;     /* read by render.ts for in-canvas building label */
        --font-building-warning-scale: 1;   /* read by render.ts for in-canvas building warning */
        --sidebar-bg: #20242a;
        --sidebar-border: #2d3138;
        --sidebar-button-bg: #2d3138;
        --sidebar-button-border: #3d434c;
        --sidebar-accent: #ffd96b;
        --sidebar-title: #8a9099;
      }
      html, body { margin: 0; padding: 0; height: 100%; background: #1a1d21; color: #eee;
        font-family: var(--font-body); overflow: hidden;
        -webkit-text-size-adjust: 100%;
        -webkit-tap-highlight-color: transparent;
      }
      /* Custom cursors by Karnation Karnage. Default arrow for the world,
         glove for clickable controls. The originals are 256×256 — most
         browsers cap CSS cursors at 32×32 and silently fall back to the
         system default if larger, so we ship downscaled 32px copies.
         Hotspots picked roughly at the arrow tip / glove fingertip. */
      body { cursor: url('assets/GothicCursor-24.png') 1 1, default; }
      /* Glove cursor only on hover over clickable controls — gothic
         arrow stays everywhere else (including the game canvas). */
      button:not(:disabled), .build-button:not(:disabled), #title-play, .options-reset, #options-cog,
      input[type="range"], input[type="color"], select {
        cursor: url('assets/GloveCursor-24.png') 9 1, pointer !important;
      }
      /* Transient gothic arrow that twists from -20° back to 0° over
         0.3s on a right-click command. Pivots from the bottom of the
         sprite for a "swing" feel. Hotspot matches the cursor rule. */
      .cursor-flash {
        position: fixed;
        width: 24px; height: 24px;
        margin-left: -1px; margin-top: -1px;
        background: url('assets/GothicCursor-24.png') no-repeat;
        background-size: 24px 24px;
        pointer-events: none;
        z-index: 99999;
        transform-origin: 1px 24px;
        animation: cursor-twist 0.3s ease-out forwards;
      }
      @keyframes cursor-twist {
        0%   { transform: rotate(-20deg); opacity: 1; }
        100% { transform: rotate(0deg);   opacity: 0; }
      }
      /* Red shockwave ring centred on the click point — used when a spawn
         button is clicked to give the gesture a sense of impact. */
      .click-emanate {
        position: fixed;
        width: 20px; height: 20px;
        border: 2px solid #e15a5a;
        border-radius: 50%;
        pointer-events: none;
        z-index: 99999;
        transform: translate(-50%, -50%) scale(0.3);
        animation: click-emanate 500ms ease-out forwards;
      }
      /* Goblin spawn uses a near-white ring; minotaur keeps the red default. */
      .click-emanate.white { border-color: #e8ecf2; }
      @keyframes click-emanate {
        0%   { transform: translate(-50%, -50%) scale(0.3); opacity: 0.95; }
        100% { transform: translate(-50%, -50%) scale(2.6); opacity: 0; }
      }
      #app { display: flex; height: 100vh; height: 100dvh; }
      #game { flex: 1; position: relative; background: #000000; overflow: hidden;
        touch-action: none; -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
        box-shadow: inset 0 0 90px rgba(0,0,0,0.9), inset 0 0 220px rgba(0,0,0,0.45);
      }
      #game canvas { display: block; touch-action: none; }
      /* Vignette darkens corners to give the play area depth without a frame.
         Sits above the canvas, below HTML overlays (which set z-index: 5). */
      #game::after {
        content: ""; position: absolute; inset: 0;
        pointer-events: none; z-index: 1;
        background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.55) 100%);
      }
      #sidebar { width: 280px;
        background: linear-gradient(180deg, #20242a 0%, #181b21 55%, #0d0f13 100%);
        border-left: 1px solid var(--sidebar-border);
        padding: 14px; box-sizing: border-box; zoom: 1.5;
        display: flex; flex-direction: column; overflow: hidden;
        position: relative;
        -webkit-overflow-scrolling: touch;
      }
      /* Subtle SVG-noise grain overlay across the whole UI. mix-blend-mode
         overlay brightens highlights and darkens shadows for a filmic feel
         at very low opacity. Sits above content but pointer-events: none. */
      body::after {
        content: ""; position: fixed; inset: 0;
        pointer-events: none; z-index: 9998;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.55'/></svg>");
        opacity: 0.06;
        mix-blend-mode: overlay;
      }
      /* TASK COMPLETE celebration overlay — covers the whole sidebar with
         black, fades in, holds, fades out (drives the new-content reveal). */
      #task-complete-overlay {
        position: absolute; inset: 0;
        background: #000;
        display: flex; align-items: center; justify-content: center;
        z-index: 50;
        opacity: 0;
        pointer-events: none;
        transition: opacity 600ms ease;
      }
      /* Show instantly (no in-fade), but on removal the base transition
         kicks in so the overlay still fades out. */
      #task-complete-overlay.shown { opacity: 1; transition: none; }
      #task-complete-overlay .task-complete-text {
        color: #fff;
        font-family: var(--font-display);
        font-size: 28px;
        letter-spacing: 0.18em;
        text-align: center;
        line-height: 1.1;
      }
      /* Build panel hugs its content while there's room (so the task line
         sits right under the last button) but caps at the remaining vertical
         space and scrolls when overflowing. flex: 0 1 auto + min-height: 0
         is the magic combo. The rest of the sidebar stays static. */
      #panel-build { flex: 0 1 auto; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }

      /* ───────── Portrait warning (mobile only) ───────── */
      #portrait-warning {
        display: none;
        position: fixed; inset: 0;
        background: #1a1d21; color: #eee;
        align-items: center; justify-content: center;
        flex-direction: column;
        text-align: center; padding: 24px;
        z-index: 1000;
      }
      #portrait-warning .icon {
        font-family: var(--font-display);
        font-size: calc(56px * var(--font-display-scale)); margin-bottom: 18px; color: #8acfff;
        animation: rotate-hint 2.4s ease-in-out infinite;
        transform-origin: center;
      }
      #portrait-warning h1 {
        font-family: var(--font-display);
        font-size: calc(22px * var(--font-display-scale)); margin: 0 0 12px; letter-spacing: 1.5px;
        color: var(--sidebar-accent);
      }
      #portrait-warning p {
        font-family: var(--font-body);
        font-size: calc(14px * var(--font-body-scale)); color: #aab2bd; max-width: 320px; line-height: 1.5;
        margin: 0;
      }
      @keyframes rotate-hint {
        0%, 40% { transform: rotate(0deg); }
        60%, 100% { transform: rotate(-90deg); }
      }
      /* Only show the rotate-device prompt on phone-sized portrait viewports
         (max-width: 600px). Desktop windows dragged narrow technically count
         as `orientation: portrait` but should keep the landscape layout. */
      @media (orientation: portrait) and (max-width: 600px) {
        #app { display: none; }
        #portrait-warning { display: flex; }
      }

      /* ───────── Compact landscape (mobile phones) ───────── */
      @media (orientation: landscape) and (max-height: 500px) {
        #sidebar {
          width: 168px;
          padding: 6px 8px;
          zoom: 1;
        }
        .panel { margin-bottom: 8px; padding: 6px 8px; border-radius: 4px; }
        .task-text { padding: 6px 8px; border-radius: 4px; }
        .panel-title { font-size: calc(9px * var(--font-display-scale)); letter-spacing: 1px; margin-bottom: 5px; gap: 6px; }
        .resource-row { font-size: calc(11px * var(--font-body-scale)); padding: 1px 0; }
        .resource-value { font-size: calc(13px * var(--font-mono-scale)); }
        .build-button { padding: 6px 8px; margin-bottom: 4px; }
        .build-name { font-size: calc(12px * var(--font-display-scale)); margin-bottom: 1px; }
        .build-meta { font-size: calc(11px * var(--font-mono-scale)); }
        .build-yields { font-size: calc(11px * var(--font-mono-scale)); line-height: 1.3; }
        .task-text { font-size: calc(10px * var(--font-body-scale)); padding: 4px 2px; line-height: 1.3; }
        #info-panel {
          zoom: 1;
          padding: 6px;
          gap: 8px;
          max-width: 240px;
          font-size: calc(10px * var(--font-body-scale));
          left: 8px; bottom: 8px;
        }
        .info-portrait { width: 48px; height: 48px; }
        .portrait-goblin { width: 30px; height: 30px; font-size: calc(15px * var(--font-mono-scale)); }
        .portrait-goblin::after { right: -7px; border-left-width: 7px; border-top-width: 5px; border-bottom-width: 5px; }
        .portrait-building { width: 36px; height: 36px; font-size: calc(13px * var(--font-mono-scale)); }
        .info-name { font-size: calc(12px * var(--font-display-scale)); margin-bottom: 2px; }
        .info-state, .info-extra { font-size: calc(10px * var(--font-body-scale)); line-height: 1.4; }
        .info-destroy { font-size: calc(10px * var(--font-body-scale)); padding: 3px 8px; margin-top: 4px; }
        #placement-hint { font-size: calc(11px * var(--font-body-scale)); padding: 4px 8px; }
      }
      .panel {
        margin-bottom: 12px;
        background: linear-gradient(180deg, rgba(42,48,56,0.55) 0%, rgba(22,25,30,0.55) 100%);
        border: 1px solid #2d3138;
        border-radius: 5px;
        padding: 9px 12px;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 2px 6px rgba(0,0,0,0.25);
        position: relative;
      }
      /* Resources got the bottom-divider treatment before panels were cards;
         the card border replaces it so we strip the redundant rule. */
      .panel.panel-resources { border-bottom: none; padding-bottom: 9px; }
      /* #panel-build is also a panel, but it scrolls when content overflows.
         Padding stays so children don't kiss the border, and overflow-y is
         set on the panel rule itself further down. */
      .panel-title { font-family: var(--font-display); font-size: calc(11px * var(--font-display-scale)); text-transform: uppercase; letter-spacing: 2px;
        color: var(--sidebar-title); margin-bottom: 8px; font-weight: 400;
        display: flex; align-items: center; gap: 8px;
      }
      /* Hairline flourishes flanking each section title — fades to transparent
         at the panel edges to avoid a hard line touching the border. */
      .panel-title::before,
      .panel-title::after {
        content: ""; flex: 1; height: 1px;
        background: linear-gradient(to right, transparent, rgba(170,180,200,0.22), transparent);
      }
      .resource-row { display: flex; justify-content: space-between; padding: 3px 0; font-family: var(--font-body); font-size: calc(13px * var(--font-body-scale)); }
      .resource-value { font-family: var(--font-mono); font-size: calc(16px * var(--font-mono-scale)); color: var(--sidebar-accent); font-weight: 400; font-variant-numeric: tabular-nums; letter-spacing: 0.5px; }
      .resource-value .power-total { color: #6a7080; font-weight: 500; }
      .build-button {
        display: block; width: 100%;
        position: relative; overflow: hidden;
        background: var(--sidebar-button-bg); border: 1px solid var(--sidebar-button-border);
        color: #eee; padding: 10px 12px; margin-bottom: 6px;
        text-align: left; cursor: pointer; border-radius: 4px;
        font-family: var(--font-body); transition: background 0.1s, border-color 0.1s;
      }
      body.no-rounded-buttons .build-button { border-radius: 0; }
      .build-button:hover:not(:disabled) { background: #353a42; border-color: var(--sidebar-button-hover-border, #5a6470); }
      .build-button:disabled { opacity: 0.55; cursor: not-allowed; border-color: transparent; }
      .build-button.active { background: #3a4a5e; border-color: #6a8eb0; box-shadow: 0 0 0 1px #6a8eb0; }
      .build-button.in-progress { border-color: #6a8eb0; opacity: 0.85; }
      /* Click feedback for spawn buttons — flash white, then fade to the
         hover colour so the animation can hand off seamlessly to :hover (no
         visible snap). If the cursor isn't on the button, the existing 0.1s
         background transition smooths the rest of the way to the default. */
      .build-button.click-flash { animation: spawn-click-flash 200ms ease-out; }
      @keyframes spawn-click-flash {
        0%   { background-color: #0a0c10; border-color: #1a1e24; }
        100% { background-color: #353a42; border-color: #5a6470; }
      }
      .build-progress-track {
        position: absolute; left: 0; top: 0; right: 0; bottom: 0;
        display: flex; flex-direction: column;
        pointer-events: none;
        z-index: 0;
      }
      .build-progress-track > .seg {
        flex: 1; position: relative; overflow: hidden;
      }
      .build-progress-track > .seg + .seg { border-top: 1px solid rgba(0,0,0,0.18); }
      .build-progress-track > .seg > .fill {
        position: absolute; left: 0; top: 0; bottom: 0;
        width: 0%;
        background: linear-gradient(to right, rgba(176,52,52,0.55), rgba(225,90,90,0.45));
        transition: width 0.12s linear;
      }
      /* Goblin spawn uses a white-ish fill so it reads as goblin (Z-cash)
         rather than minotaur (blood). Minotaur keeps the default red. */
      #btn-spawn-goblin .build-progress-track > .seg > .fill {
        background: linear-gradient(to right, rgba(220,225,235,0.15), rgba(245,250,255,0.22));
      }
      .build-content { position: relative; z-index: 1; display: flex; align-items: center; gap: 10px; }
      .build-text { flex: 1; min-width: 0; }
      .build-yields {
        font-family: var(--font-mono);
        font-size: calc(12px * var(--font-mono-scale)); font-weight: 600;
        text-align: right; white-space: nowrap; line-height: 1.4;
        font-variant-numeric: tabular-nums;
      }
      .build-yields .yield-money { color: var(--sidebar-accent); }
      .build-yields .yield-power { color: #8acfff; }
      .task-text {
        font-family: var(--font-body);
        font-size: calc(12px * var(--font-body-scale));
        color: var(--sidebar-title);
        text-align: center;
        padding: 8px 12px;
        margin: 0;
        line-height: 1.4;
        background: linear-gradient(180deg, rgba(42,48,56,0.55) 0%, rgba(22,25,30,0.55) 100%);
        border: 1px solid #2d3138;
        border-radius: 5px;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 2px 6px rgba(0,0,0,0.25);
      }
      .task-text strong { color: #b8bec6; font-weight: 600; }
      .build-button.locked { display: none; }
      /* The browser's default [hidden] { display: none } loses to our
         .build-button { display: block }, so the `hidden` attribute had no
         effect on title-screen buttons. Re-assert it at the same specificity
         as .build-button so resume/erase actually hide. */
      .build-button[hidden] { display: none; }
      /* Applied for one animation cycle the first time a build/ritual
         button becomes visible — gives newly-revealed buttons a soft
         fade-in instead of just popping into existence. Disabled buttons
         end the animation at 0.55 (matching :disabled) so they don't
         briefly flash to full opacity then snap back. */
      .build-button.fade-in { animation: build-button-fade-in 700ms ease; }
      .build-button.fade-in:disabled { animation: build-button-fade-in-disabled 700ms ease; }
      @keyframes build-button-fade-in { from { opacity: 0; } to { opacity: 1; } }
      @keyframes build-button-fade-in-disabled { from { opacity: 0; } to { opacity: 0.55; } }
      .build-warning {
        position: absolute; left: 0; right: 0; bottom: 0;
        font-family: var(--font-body);
        font-size: calc(10px * var(--font-body-scale));
        color: #ffb0b0;
        background: rgba(120, 30, 30, 0.55);
        text-align: center; padding: 2px 4px;
        z-index: 2;
        pointer-events: none;
      }
      .build-name { font-family: var(--font-display); font-size: calc(14px * var(--font-display-scale)); font-weight: 400; letter-spacing: 0.5px; margin-bottom: 3px; }
      .build-meta { font-family: var(--font-mono); font-size: calc(13px * var(--font-mono-scale)); color: var(--sidebar-title); line-height: 1.5; font-variant-numeric: tabular-nums; }
      .build-cost { color: #d96b6b; font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
      .build-cost.met { color: #6fbf73; }
      .build-cost.owned { color: #6a7080; }
      .build-button-compact { padding: 5px 10px; }
      .build-button-compact .build-name { margin-bottom: 0; }
      .build-cost-side { font-family: var(--font-mono); font-size: calc(13px * var(--font-mono-scale)); white-space: nowrap; font-variant-numeric: tabular-nums; }
      .build-separator { height: 1px; background: rgba(255,255,255,0.08); margin: 8px 4px; }
      /* Power costs always render in the same blue as power production —
         we don't flip them red even when the player can't afford. */
      .build-power-cost { color: #8acfff; font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
      .build-req { color: #d96b6b; }
      .build-req.met { color: #6fbf73; }
      #placement-hint {
        position: absolute; top: 10px; left: 10px;
        background: rgba(0,0,0,0.7); padding: 6px 10px;
        border-radius: 3px; font-family: var(--font-body); font-size: calc(12px * var(--font-body-scale)); pointer-events: none;
        display: none; color: var(--sidebar-accent);
        z-index: 5;
      }
      #pan-hint {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        background: rgba(0,0,0,0.7); padding: 10px 18px;
        border-radius: 4px; font-family: var(--font-body); font-size: calc(20px * var(--font-body-scale));
        pointer-events: none; color: #fff; letter-spacing: 2px;
        display: none;
        z-index: 5;
      }

      /* ───────── Bottom-left info panel ───────── */
      #info-panel {
        position: absolute; left: 12px; bottom: 12px;
        display: none;
        background: rgba(20, 24, 30, 0.92);
        border: 1px solid #3d434c;
        border-radius: 5px;
        padding: 10px;
        gap: 12px;
        align-items: stretch;
        max-width: 360px;
        color: #eee;
        font-family: var(--font-body);
        font-size: calc(12px * var(--font-body-scale));
        box-shadow: 0 4px 16px rgba(0,0,0,0.4);
        pointer-events: none;
        zoom: 1.75;
        z-index: 5;
      }
      #info-panel.visible { display: flex; }
      .info-portrait {
        width: 72px; height: 72px;
        border: 1px solid #3d434c;
        border-radius: 4px;
        background: #2b3036;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
        position: relative;
      }
      .portrait-goblin {
        width: 44px; height: 44px;
        border-radius: 50%;
        background: #6fbf73;
        border: 2px solid #2d4a30;
        color: #102510;
        font-family: var(--font-mono);
        font-weight: bold;
        font-size: calc(22px * var(--font-mono-scale));
        display: flex; align-items: center; justify-content: center;
        position: relative;
      }
      .portrait-goblin::after {
        content: "";
        position: absolute;
        right: -10px; top: 50%; transform: translateY(-50%);
        border-left: 9px solid #1f3522;
        border-top: 6px solid transparent;
        border-bottom: 6px solid transparent;
      }
      .portrait-building {
        width: 50px; height: 50px;
        color: #fff;
        font-family: var(--font-mono);
        font-weight: bold;
        font-size: calc(18px * var(--font-mono-scale));
        display: flex; align-items: center; justify-content: center;
        border-radius: 2px;
        border-width: 2px; border-style: solid;
      }
      .portrait-building.phone_farm.active { background: #8a7a3a; border-color: #eada6a; }
      .portrait-building.goblin_wheel.active { background: #3a6a8a; border-color: #8acfff; }
      .portrait-building.gas_engine.active { background: #3a6a3a; border-color: #8aef8a; }
      .portrait-building.datacentre.active { background: #8a3a3a; border-color: #ff8080; }
      .portrait-building.goblin_hole.active { background: #4a2a4a; border-color: #a06aff; }
      .portrait-hole {
        width: 44px; height: 44px;
        border-radius: 50%;
        background: radial-gradient(circle at 50% 40%, #1a1a1a 0%, #050505 70%);
        border: 2px solid #2a2a2a;
        box-shadow: inset 0 4px 8px rgba(0,0,0,0.85);
      }
      .portrait-water {
        width: 44px; height: 44px;
        background: radial-gradient(circle at 50% 35%, #5fa8ff 0%, #1f4e9c 70%, #0a2150 100%);
        border: 2px solid #2a4a78;
        box-shadow: inset 0 3px 6px rgba(255,255,255,0.18), inset 0 -3px 6px rgba(0,0,0,0.55);
      }
      .portrait-building.constructing { background: #3a3f47; border-color: #808890; }
      .portrait-building.dormant { background: #5a4a3a; border-color: #d99a5a; }
      .info-details {
        flex: 1;
        display: flex; flex-direction: column;
        justify-content: center;
        min-width: 160px;
      }
      .info-name { font-family: var(--font-display); font-size: calc(15px * var(--font-display-scale)); font-weight: 400; letter-spacing: 0.5px; margin-bottom: 4px; color: #fff; }
      .info-state { font-family: var(--font-body); font-size: calc(12px * var(--font-body-scale)); color: var(--sidebar-title); line-height: 1.5; }
      .info-extra { font-family: var(--font-body); font-size: calc(12px * var(--font-body-scale)); color: #ccc; line-height: 1.5; margin-top: 2px; }
      #info-panel button { pointer-events: auto; }
      .info-destroy {
        align-self: flex-start;
        margin-top: 8px;
        background: #5a2828;
        border: 1px solid #8a3838;
        color: #ffc8c8;
        padding: 4px 10px;
        font-family: var(--font-body);
        font-size: calc(11px * var(--font-body-scale));
        font-weight: 600;
        border-radius: 3px;
        cursor: pointer;
      }
      .info-destroy:hover { background: #6a3838; border-color: #b04848; }
      .hole-toggle {
        display: flex; align-items: center; gap: 6px;
        font-family: var(--font-body);
        font-size: calc(11px * var(--font-body-scale));
        color: #ccc;
        margin-top: 6px;
        cursor: pointer;
        user-select: none;
        pointer-events: auto;
      }
      .hole-toggle input { cursor: pointer; pointer-events: auto; }

      /* ───────── Options cogs + panels ───────── */
      /* Two cogs: public (always visible, master/music sliders + flavour) and
         admin (full options, hidden until Dragon Beacon unlock in prod). The
         admin cog sits to the left of the public one when both are shown. */
      #options-cog,
      #options-cog-public {
        position: absolute;
        bottom: 10px;
        width: 26px; height: 26px;
        padding: 0; line-height: 1;
        font-size: 16px;
        background: rgba(20, 24, 30, 0.7);
        color: #aab2bd;
        border: 1px solid #3d434c;
        border-radius: 50%;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        z-index: 50;
        font-family: inherit;
        transition: background 0.1s, color 0.1s, transform 0.1s;
      }
      #options-cog-public { right: 10px; }
      #options-cog        { right: 44px; }
      #options-cog:hover,
      #options-cog-public:hover { background: rgba(40, 48, 60, 0.9); color: #fff; transform: rotate(15deg); }
      #options-panel,
      #options-panel-public {
        position: absolute;
        bottom: 44px;
        width: 280px;
        max-height: 70vh;
        overflow-y: auto;
        background: rgba(20, 24, 30, 0.96);
        border: 1px solid #3d434c;
        border-radius: 5px;
        padding: 10px 12px;
        z-index: 50;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 12px;
        color: #d8dee4;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5);
      }
      #options-panel-public { right: 10px; width: 240px; }
      #options-panel        { right: 44px; }
      #options-panel[hidden],
      #options-panel-public[hidden] { display: none; }
      .options-flavor {
        margin-top: 6px;
        padding: 6px 4px 2px;
        font-style: italic;
        font-size: 11px;
        color: #8a9099;
        text-align: center;
        letter-spacing: 0.04em;
      }
      .options-section { margin-bottom: 14px; }
      .options-section-title {
        font-family: var(--font-display);
        font-size: 11px; text-transform: uppercase; letter-spacing: 2px;
        color: #8a9099; margin-bottom: 6px;
      }
      .options-row {
        display: flex; align-items: center; justify-content: space-between;
        gap: 8px; padding: 3px 0;
      }
      .options-label { color: #b8bec6; flex: 1; min-width: 0; }
      .options-row input[type="checkbox"] { accent-color: #8acfff; cursor: pointer; }
      .options-row input[type="color"] {
        width: 36px; height: 22px; padding: 0; border: 1px solid #3d434c;
        background: transparent; cursor: pointer; border-radius: 3px;
      }
      .options-row select {
        background: #2a2f37; color: #eee;
        border: 1px solid #3d434c; border-radius: 3px;
        padding: 3px 6px; font-size: 11px; font-family: inherit;
        max-width: 160px;
      }
      .options-slider { display: flex; align-items: center; gap: 6px; }
      .options-slider input[type="range"] { width: 100px; accent-color: #8acfff; }
      .options-slider-value {
        font-family: var(--font-mono); font-size: 11px;
        color: #ffd96b; min-width: 32px; text-align: right;
        font-variant-numeric: tabular-nums;
      }
      .options-fontrow { padding: 4px 0; }
      .options-fontrow-label { color: #b8bec6; margin-bottom: 3px; }
      .options-fontrow-controls {
        display: flex; align-items: center; gap: 6px;
      }
      .options-fontrow-controls select { flex: 1; min-width: 0; max-width: none; }
      .options-fontrow-controls .options-slider input[type="range"] { width: 70px; }
      .options-reset {
        width: 100%; margin-top: 6px;
        background: #2a2f37; color: #b8bec6;
        border: 1px solid #3d434c; border-radius: 3px;
        padding: 6px; cursor: pointer;
        font-family: inherit; font-size: 11px;
      }
      .options-reset:hover { background: #353a42; color: #fff; }

      /* ───────── Title screen (production only) ───────── */
      /* Default: black backdrop covers everything. The first paint in prod is
         pure black; the title content fades in on top. Dev hides the whole
         overlay via the .dev class set by the inline script in <body>. */
      #title-screen {
        display: flex;
        position: fixed; inset: 0;
        background: #000;
        flex-direction: column;
        align-items: center; justify-content: center;
        gap: 32px;
        z-index: 1500;
        opacity: 1;
        transition: opacity 1400ms ease;
      }
      html.dev #title-screen { display: none; }
      /* Title text + Play button — fade independently so we get
         black → title → black → game on the play-click sequence. */
      #title-screen .title-content {
        display: flex; flex-direction: column;
        align-items: center; gap: 32px;
        opacity: 0;
        transition: opacity 1400ms ease;
      }
      #title-screen.shown .title-content { opacity: 1; }
      #title-screen.fading-out { opacity: 0; }
      #title-screen h1 {
        font-family: var(--font-display);
        font-size: clamp(32px, 7vw, 72px);
        letter-spacing: 0.18em;
        margin: 0; color: #ffffff;
        text-transform: lowercase;
      }
      /* Play / resume buttons styled like the in-game build/spawn button so
         the title transition feels continuous with gameplay. The 2s fill is
         driven by JS — see showTitleScreen in main.ts. */
      #title-play.build-button,
      #title-resume.build-button,
      #title-erase.build-button {
        width: 240px;
        font-family: var(--font-display);
        color: #ffffff;
      }
      #title-play.build-button:hover:not(:disabled),
      #title-resume.build-button:hover:not(:disabled),
      #title-erase.build-button:hover:not(:disabled) { border-color: #e25555; }
      #title-play .build-name,
      #title-resume .build-name,
      #title-erase .build-name {
        font-size: 18px; letter-spacing: 0.15em; text-align: left;
      }
      .title-button-stack { width: 100%; display: flex; flex-direction: column; align-items: flex-start; }
      .title-resume-meta {
        font-family: var(--font-body);
        font-size: 11px;
        color: rgba(255, 255, 255, 0.55);
        letter-spacing: 0.05em;
        text-align: left;
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <script>
      // Inline so it runs before the title-screen element paints. In dev we
      // skip the title gate entirely; in prod the first paint is pure black.
      if (location.hostname === 'localhost' || location.hostname.startsWith('127.')) {
        document.documentElement.classList.add('dev');
      }
    </script>
    <div id="title-screen">
      <div class="title-content">
        <h1>goblin scaling</h1>
        <button id="title-resume" class="build-button" hidden>
          <div class="build-progress-track">
            <div class="seg"><div class="fill" id="title-resume-fill"></div></div>
          </div>
          <div class="build-content">
            <div class="title-button-stack">
              <div class="build-name">Resume</div>
              <div class="title-resume-meta" id="title-resume-meta"></div>
            </div>
          </div>
        </button>
        <button id="title-erase" class="build-button" hidden>
          <div class="build-progress-track">
            <div class="seg"><div class="fill" id="title-erase-fill"></div></div>
          </div>
          <div class="build-content">
            <div class="build-name">Erase Data</div>
          </div>
        </button>
        <button id="title-play" class="build-button">
          <div class="build-progress-track">
            <div class="seg"><div class="fill" id="title-play-fill"></div></div>
          </div>
          <div class="build-content">
            <div class="build-name" id="title-play-label">Spawn</div>
          </div>
        </button>
      </div>
    </div>
    <div id="portrait-warning">
      <div class="icon">⟳</div>
      <h1>Rotate your device</h1>
      <p>Goblin Datacentres plays best in landscape. Turn your phone sideways to start managing goblins.</p>
    </div>
    <div id="app">
      <div id="game">
        <div id="placement-hint"></div>
        <!-- Surfaced once the player has dug; dismissed on first pan input. -->
        <div id="pan-hint">↑ ↓ ← → / WASD</div>
        <div id="info-panel">
          <div class="info-portrait" id="info-portrait"></div>
          <div class="info-details">
            <div class="info-name" id="info-name"></div>
            <div class="info-state" id="info-state"></div>
            <div class="info-extra" id="info-extra"></div>
            <button class="info-destroy" id="info-destroy" style="display:none">Destroy</button>
            <div id="info-destroy-warning" style="display:none; color:#d96b6b; font-size: calc(10px * var(--font-body-scale)); margin-top:3px">needs minotaur</div>
            <button class="info-destroy" id="info-kill" style="display:none">Kill</button>
          </div>
        </div>
      </div>
      <div id="sidebar">
        <div id="task-complete-overlay">
          <div class="task-complete-text">TASK<br>COMPLETE</div>
        </div>
        <div class="panel panel-resources">
          <div class="panel-title">Resources</div>
          <div class="resource-row"><span style="color: var(--sidebar-accent)">Ƶ Cash</span><span class="resource-value" id="money">0</span></div>
          <div class="resource-row" id="row-blood"><span style="color:#d96b6b">Blood</span><span class="resource-value" id="blood" style="color:#ff8a8a">0</span></div>
          <div class="resource-row" id="row-power" style="display:none"><span style="color:#8acfff">Power</span><span class="resource-value" id="power">0 / 0 W</span></div>
        </div>
        <div class="panel" id="panel-summon">
          <div class="panel-title">Summon</div>
          <div id="summon-list"></div>
        </div>
        <div class="panel" id="panel-build">
          <!-- Rituals + Build share one scroll container so they can overflow
               together. Each subsection has its own title, and Ritual hides
               itself before any of its content unlocks. The task text sits
               at the end so it always tucks directly under the last button
               instead of pinning to the sidebar floor. -->
          <div id="ritual-section" style="display:none">
            <div class="panel-title">Ritual</div>
            <div id="ritual-list"></div>
          </div>
          <div id="build-section" style="display:none">
            <div class="panel-title">Build</div>
            <div id="build-list"></div>
          </div>
        </div>
        <div id="task-text" class="task-text"></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
