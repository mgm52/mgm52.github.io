<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Goblin Datacentres</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=VT323&display=swap" rel="stylesheet">
    <style>
      :root {
        --font-display: 'Audiowide', system-ui, sans-serif;
        --font-mono: 'VT323', 'Consolas', monospace;
      }
      html, body { margin: 0; padding: 0; height: 100%; background: #1a1d21; color: #eee;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif; overflow: hidden; }
      #app { display: flex; height: 100vh; }
      #game { flex: 1; position: relative; background: #000000; overflow: hidden; }
      #game canvas { display: block; }
      #sidebar { width: 280px; background: #20242a; border-left: 1px solid #2d3138;
        padding: 14px; overflow-y: auto; box-sizing: border-box; zoom: 1.5; }
      .panel { margin-bottom: 18px; }
      .panel-title { font-family: var(--font-display); font-size: 11px; text-transform: uppercase; letter-spacing: 2px;
        color: #8a9099; margin-bottom: 6px; font-weight: 400; }
      .resource-row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 13px; }
      .resource-value { font-family: var(--font-mono); font-size: 16px; color: #ffd96b; font-weight: 400; font-variant-numeric: tabular-nums; letter-spacing: 0.5px; }
      .resource-value .power-total { color: #6a7080; font-weight: 500; }
      .build-button {
        display: block; width: 100%;
        position: relative; overflow: hidden;
        background: #2d3138; border: 1px solid #3d434c;
        color: #eee; padding: 10px 12px; margin-bottom: 6px;
        text-align: left; cursor: pointer; border-radius: 4px;
        font-family: inherit; transition: background 0.1s, border-color 0.1s;
      }
      .build-button:hover:not(:disabled) { background: #353a42; border-color: #5a6470; }
      .build-button:disabled { opacity: 0.55; cursor: not-allowed; }
      .build-button.active { background: #3a4a5e; border-color: #6a8eb0; box-shadow: 0 0 0 1px #6a8eb0; }
      .build-button.in-progress { border-color: #6a8eb0; opacity: 0.85; }
      .build-progress-track {
        position: absolute; left: 0; top: 0; right: 0; bottom: 0;
        display: flex; flex-direction: column;
        pointer-events: none;
        z-index: 0;
      }
      .build-progress-track > .seg {
        flex: 1; position: relative; overflow: hidden;
      }
      .build-progress-track > .seg + .seg { border-top: 1px solid rgba(0,0,0,0.18); }
      .build-progress-track > .seg > .fill {
        position: absolute; left: 0; top: 0; bottom: 0;
        width: 0%;
        background: linear-gradient(to right, rgba(106,142,176,0.55), rgba(138,207,255,0.45));
        transition: width 0.12s linear;
      }
      .build-content { position: relative; z-index: 1; display: flex; align-items: center; gap: 10px; }
      .build-text { flex: 1; min-width: 0; }
      .build-yields {
        font-size: 12px; font-weight: 600;
        text-align: right; white-space: nowrap; line-height: 1.4;
      }
      .build-yields .yield-money { color: #ffd96b; }
      .build-yields .yield-power { color: #8acfff; }
      .task-text {
        font-size: 12px;
        color: #8a9099;
        text-align: center;
        padding: 8px 4px;
        margin: 4px 0 0;
        line-height: 1.4;
      }
      .task-text strong { color: #b8bec6; font-weight: 600; }
      .build-button.locked { display: none; }
      .build-name { font-family: var(--font-display); font-size: 14px; font-weight: 400; letter-spacing: 0.5px; margin-bottom: 3px; }
      .build-meta { font-size: 11px; color: #8a9099; line-height: 1.5; }
      .build-cost { color: #d96b6b; }
      .build-cost.met { color: #6fbf73; }
      .build-power-cost { color: #d96b6b; }
      .build-power-cost.met { color: #6fbf73; }
      .build-req { color: #d96b6b; }
      .build-req.met { color: #6fbf73; }
      #placement-hint {
        position: absolute; top: 10px; left: 10px;
        background: rgba(0,0,0,0.7); padding: 6px 10px;
        border-radius: 3px; font-size: 12px; pointer-events: none;
        display: none; color: #ffd96b;
      }

      /* ───────── Bottom-left info panel ───────── */
      #info-panel {
        position: absolute; left: 12px; bottom: 12px;
        display: none;
        background: rgba(20, 24, 30, 0.92);
        border: 1px solid #3d434c;
        border-radius: 5px;
        padding: 10px;
        gap: 12px;
        align-items: stretch;
        max-width: 360px;
        color: #eee;
        font-size: 12px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.4);
        pointer-events: none;
        zoom: 1.75;
      }
      #info-panel.visible { display: flex; }
      .info-portrait {
        width: 72px; height: 72px;
        border: 1px solid #3d434c;
        border-radius: 4px;
        background: #2b3036;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
        position: relative;
      }
      .portrait-goblin {
        width: 44px; height: 44px;
        border-radius: 50%;
        background: #6fbf73;
        border: 2px solid #2d4a30;
        color: #102510;
        font-family: var(--font-mono);
        font-weight: bold;
        font-size: 22px;
        display: flex; align-items: center; justify-content: center;
        position: relative;
      }
      .portrait-goblin::after {
        content: "";
        position: absolute;
        right: -10px; top: 50%; transform: translateY(-50%);
        border-left: 9px solid #1f3522;
        border-top: 6px solid transparent;
        border-bottom: 6px solid transparent;
      }
      .portrait-building {
        width: 50px; height: 50px;
        color: #fff;
        font-family: var(--font-mono);
        font-weight: bold;
        font-size: 18px;
        display: flex; align-items: center; justify-content: center;
        border-radius: 2px;
        border-width: 2px; border-style: solid;
      }
      .portrait-building.datacentre.active { background: #8a7a3a; border-color: #eada6a; }
      .portrait-building.goblin_wheel.active { background: #3a6a8a; border-color: #8acfff; }
      .portrait-building.coal_plant.active { background: #3a6a3a; border-color: #8aef8a; }
      .portrait-building.megacentre.active { background: #8a3a3a; border-color: #ff8080; }
      .portrait-building.constructing { background: #3a3f47; border-color: #808890; }
      .portrait-building.dormant { background: #5a4a3a; border-color: #d99a5a; }
      .info-details {
        flex: 1;
        display: flex; flex-direction: column;
        justify-content: center;
        min-width: 160px;
      }
      .info-name { font-family: var(--font-display); font-size: 15px; font-weight: 400; letter-spacing: 0.5px; margin-bottom: 4px; color: #fff; }
      .info-state { color: #8a9099; line-height: 1.5; }
      .info-extra { color: #ccc; line-height: 1.5; margin-top: 2px; }
      #info-panel button { pointer-events: auto; }
      .info-destroy {
        align-self: flex-start;
        margin-top: 8px;
        background: #5a2828;
        border: 1px solid #8a3838;
        color: #ffc8c8;
        padding: 4px 10px;
        font-size: 11px;
        font-weight: 600;
        border-radius: 3px;
        cursor: pointer;
        font-family: inherit;
      }
      .info-destroy:hover { background: #6a3838; border-color: #b04848; }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="game">
        <div id="placement-hint"></div>
        <div id="info-panel">
          <div class="info-portrait" id="info-portrait"></div>
          <div class="info-details">
            <div class="info-name" id="info-name"></div>
            <div class="info-state" id="info-state"></div>
            <div class="info-extra" id="info-extra"></div>
            <button class="info-destroy" id="info-destroy" style="display:none">Destroy</button>
          </div>
        </div>
      </div>
      <div id="sidebar">
        <div class="panel">
          <div class="panel-title">Resources</div>
          <div class="resource-row"><span>$ Money</span><span class="resource-value" id="money">0</span></div>
          <div class="resource-row"><span>Power</span><span class="resource-value" id="power">0 / 0 W</span></div>
        </div>
        <div class="panel" id="panel-summon">
          <div class="panel-title">Summon</div>
          <div id="summon-list"></div>
        </div>
        <div class="panel" id="panel-build">
          <div class="panel-title">Build</div>
          <div id="build-list"></div>
        </div>
        <div id="task-text" class="task-text"></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
