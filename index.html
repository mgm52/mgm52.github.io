<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Goblin Datacentres</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #1a1d21; color: #eee;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif; overflow: hidden; }
      #app { display: flex; height: 100vh; }
      #game { flex: 1; position: relative; background: #2b3036; overflow: hidden; }
      #game canvas { display: block; }
      #sidebar { width: 280px; background: #20242a; border-left: 1px solid #2d3138;
        padding: 14px; overflow-y: auto; box-sizing: border-box; }
      .panel { margin-bottom: 18px; }
      .panel-title { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px;
        color: #8a9099; margin-bottom: 6px; font-weight: 600; }
      .resource-row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 13px; }
      .resource-value { color: #ffd96b; font-weight: 600; font-variant-numeric: tabular-nums; }
      .resource-value .power-total { color: #6a7080; font-weight: 500; }
      .build-button {
        display: block; width: 100%;
        position: relative; overflow: hidden;
        background: #2d3138; border: 1px solid #3d434c;
        color: #eee; padding: 10px 12px; margin-bottom: 6px;
        text-align: left; cursor: pointer; border-radius: 4px;
        font-family: inherit; transition: background 0.1s, border-color 0.1s;
      }
      .build-button:hover:not(:disabled) { background: #353a42; border-color: #5a6470; }
      .build-button:disabled { opacity: 0.55; cursor: not-allowed; }
      .build-button.active { background: #3a4a5e; border-color: #6a8eb0; box-shadow: 0 0 0 1px #6a8eb0; }
      .build-button.in-progress { border-color: #6a8eb0; opacity: 0.85; }
      .build-progress-track {
        position: absolute; left: 0; top: 0; right: 0; bottom: 0;
        display: flex; flex-direction: column;
        pointer-events: none;
        z-index: 0;
      }
      .build-progress-track > .seg {
        flex: 1; position: relative; overflow: hidden;
      }
      .build-progress-track > .seg + .seg { border-top: 1px solid rgba(0,0,0,0.18); }
      .build-progress-track > .seg > .fill {
        position: absolute; left: 0; top: 0; bottom: 0;
        width: 0%;
        background: linear-gradient(to right, rgba(106,142,176,0.55), rgba(138,207,255,0.45));
        transition: width 0.12s linear;
      }
      .build-content { position: relative; z-index: 1; }
      .task-text {
        font-size: 12px;
        color: #8a9099;
        text-align: center;
        padding: 8px 4px;
        margin: 4px 0 0;
        line-height: 1.4;
      }
      .task-text strong { color: #b8bec6; font-weight: 600; }
      .build-button.locked { display: none; }
      .build-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
      .build-meta { font-size: 11px; color: #8a9099; line-height: 1.5; }
      .build-cost { color: #ffd96b; }
      .build-power-cost { color: #8acfff; }
      .build-power-cost.unmet { color: #d96b6b; }
      .build-req { color: #6fbf73; }
      .build-req.unmet { color: #d96b6b; }
      #placement-hint {
        position: absolute; top: 10px; left: 10px;
        background: rgba(0,0,0,0.7); padding: 6px 10px;
        border-radius: 3px; font-size: 12px; pointer-events: none;
        display: none; color: #ffd96b;
      }

      /* ───────── Bottom-left info panel ───────── */
      #info-panel {
        position: absolute; left: 12px; bottom: 12px;
        display: none;
        background: rgba(20, 24, 30, 0.92);
        border: 1px solid #3d434c;
        border-radius: 5px;
        padding: 10px;
        gap: 12px;
        align-items: stretch;
        max-width: 360px;
        color: #eee;
        font-size: 12px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.4);
        pointer-events: none;
      }
      #info-panel.visible { display: flex; }
      .info-portrait {
        width: 72px; height: 72px;
        border: 1px solid #3d434c;
        border-radius: 4px;
        background: #2b3036;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
        position: relative;
      }
      .portrait-goblin {
        width: 44px; height: 44px;
        border-radius: 50%;
        background: #6fbf73;
        border: 2px solid #2d4a30;
        color: #102510;
        font-family: monospace;
        font-weight: bold;
        font-size: 22px;
        display: flex; align-items: center; justify-content: center;
        position: relative;
      }
      .portrait-goblin::after {
        content: "";
        position: absolute;
        right: -10px; top: 50%; transform: translateY(-50%);
        border-left: 9px solid #1f3522;
        border-top: 6px solid transparent;
        border-bottom: 6px solid transparent;
      }
      .portrait-building {
        width: 50px; height: 50px;
        color: #fff;
        font-family: monospace;
        font-weight: bold;
        font-size: 18px;
        display: flex; align-items: center; justify-content: center;
        border-radius: 2px;
        border-width: 2px; border-style: solid;
      }
      .portrait-building.datacentre.active { background: #3a6a8a; border-color: #8acfff; }
      .portrait-building.goblin_wheel.active { background: #6a8a3a; border-color: #b8d96b; }
      .portrait-building.coal_plant.active { background: #6a4a2a; border-color: #c49a5a; }
      .portrait-building.nuclear_plant.active { background: #2a8a4a; border-color: #6af090; }
      .portrait-building.constructing { background: #3a3f47; border-color: #808890; }
      .portrait-building.dormant { background: #5a4a3a; border-color: #d99a5a; }
      .info-details {
        flex: 1;
        display: flex; flex-direction: column;
        justify-content: center;
        min-width: 160px;
      }
      .info-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; color: #fff; }
      .info-state { color: #8a9099; line-height: 1.5; }
      .info-extra { color: #ccc; line-height: 1.5; margin-top: 2px; }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="game">
        <div id="placement-hint"></div>
        <div id="info-panel">
          <div class="info-portrait" id="info-portrait"></div>
          <div class="info-details">
            <div class="info-name" id="info-name"></div>
            <div class="info-state" id="info-state"></div>
            <div class="info-extra" id="info-extra"></div>
          </div>
        </div>
      </div>
      <div id="sidebar">
        <div class="panel">
          <div class="panel-title">Resources</div>
          <div class="resource-row"><span>$ Money</span><span class="resource-value" id="money">0</span></div>
          <div class="resource-row"><span>Power</span><span class="resource-value" id="power">0 / 0 W</span></div>
        </div>
        <div class="panel">
          <div class="panel-title">Build</div>
          <div id="build-list"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
